[platformio]
default_envs = motor_driver_s3, joystick1, joystick2

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.2
    makuna/NeoPixelBus @ ^2.8.3
build_flags =
    -DCAN_BITRATE=250000
    -DPROTOCOL_PRIORITY_DEFAULT=6
    -DWATCHDOG_TIMEOUT_MS=1000

; --- Motor Driver (ESP32-S3) ---
[env:motor_driver_s3]
board = esp32s3box
board_build.mcu = esp32s3
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
build_flags =
    ${env.build_flags}
    -DECU_TYPE_MOTOR_DRIVER
    -DECU_PREFERRED_ADDRESS=0x20
    -DECU_NAME_MOTOR_DRIVER=0x01
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_I2CDEV_NOLOCK=1
    -DCAN_TX_PIN=16
    -DCAN_RX_PIN=17
    -DWS2812_PIN=39
    -DPCA9685_SDA=8
    -DPCA9685_SCL=18
    -DPCA9685_I2C_ADDR1=0x40
    -DPCA9685_I2C_ADDR2=0x41
    -DSAFETY_TIMEOUT_MS=80

[env:motor_driver_s3_ota]
extends = env:motor_driver_s3
build_flags =
    ${env:motor_driver_s3.build_flags}
    -DENABLE_OTA_WEBSERVER

; --- Motor Driver S3 via UART (no USB-CDC) ---
[env:motor_driver_s3_uart]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
upload_speed = 115200
build_flags =
    ${env.build_flags}
    -DECU_TYPE_MOTOR_DRIVER
    -DECU_PREFERRED_ADDRESS=0x20
    -DECU_NAME_MOTOR_DRIVER=0x01
    -DCONFIG_I2CDEV_NOLOCK=1
    -DCAN_TX_PIN=17
    -DCAN_RX_PIN=16
    -DWS2812_PIN=39
    -DPCA9685_SDA=8
    -DPCA9685_SCL=18
    -DPCA9685_I2C_ADDR1=0x40
    -DPCA9685_I2C_ADDR2=0x41
    -DSAFETY_TIMEOUT_MS=80

[env:motor_driver_s3_uart_ota]
extends = env:motor_driver_s3_uart
build_flags =
    ${env:motor_driver_s3_uart.build_flags}
    -DENABLE_OTA_WEBSERVER

; --- Motor Driver (legacy T-CAN) ---
[env:motor_driver]
build_flags =
    ${env.build_flags}
    -DECU_TYPE_MOTOR_DRIVER
    -DECU_PREFERRED_ADDRESS=0x20
    -DECU_NAME_MOTOR_DRIVER=0x01
    -DCAN_TX_PIN=5
    -DCAN_RX_PIN=4
    -DWS2812_PIN=48
    -DPCA9685_SDA=21
    -DPCA9685_SCL=22
    -DPCA9685_I2C_ADDR1=0x40
    -DPCA9685_I2C_ADDR2=0x41
    -DSAFETY_TIMEOUT_MS=80

[env:joystick1]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DECU_TYPE_JOYSTICK
    -DECU_PREFERRED_ADDRESS=0x21
    -DECU_JOYSTICK_ID=1
    -DCAN_TX_PIN=27
    -DCAN_RX_PIN=26
    -DCAN_SPEED_MODE_PIN=23
    -DCAN_ME2107_EN_PIN=16
    -DWS2812_PIN=4
    -DPOT1_PIN=32
    -DPOT2_PIN=33
    -DPOT3_PIN=34
    -DBTN1_PIN=12
    -DBTN2_PIN=5

[env:joystick2]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DECU_TYPE_JOYSTICK
    -DECU_PREFERRED_ADDRESS=0x22
    -DECU_JOYSTICK_ID=2
    -DCAN_TX_PIN=27
    -DCAN_RX_PIN=26
    -DCAN_SPEED_MODE_PIN=23
    -DCAN_ME2107_EN_PIN=16
    -DWS2812_PIN=4
    -DPOT1_PIN=32
    -DPOT2_PIN=33
    -DPOT3_PIN=34
    -DBTN1_PIN=12
    -DBTN2_PIN=5

[env:motor_driver_ota]
extends = env:motor_driver
build_flags =
    ${env:motor_driver.build_flags}
    -DENABLE_OTA_WEBSERVER

[env:joystick1_ota]
extends = env:joystick1
build_flags =
    ${env:joystick1.build_flags}
    -DENABLE_OTA_WEBSERVER

[env:joystick2_ota]
extends = env:joystick2
build_flags =
    ${env:joystick2.build_flags}
    -DENABLE_OTA_WEBSERVER
